{% extends "base.html" %}
{% block title %}Редактирование сделки — crmTool{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <div class="text-sm text-slate-500 mb-2">
    <a href="/accounts/{{ deal.account_id }}#deals" class="hover:underline">← {{ deal.account.name }}</a>
  </div>
  <h1 class="text-2xl font-semibold mb-5">Редактирование сделки</h1>
  <form method="post" action="/deals/{{ deal.id }}/edit" class="bg-white rounded-xl shadow-sm p-6 space-y-4">
    <div>
      <label class="block text-sm text-slate-600 mb-1">Название *</label>
      <input name="title" required value="{{ deal.title }}" class="w-full border border-slate-300 rounded px-3 py-2">
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-slate-600 mb-1">Этап</label>
        <select name="stage" class="w-full border border-slate-300 rounded px-3 py-2">
          {% for s in DEAL_STAGES %}<option value="{{ s }}" {{ 'selected' if deal.stage==s }}>{{ s }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm text-slate-600 mb-1">Ответственный</label>
        <select name="owner_id" class="w-full border border-slate-300 rounded px-3 py-2">
          <option value="">— не назначен —</option>
          {% for u in users %}<option value="{{ u.id }}" {{ 'selected' if deal.owner_id==u.id }}>{{ u.name }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
      <div>
        <label class="block text-sm text-slate-600 mb-1">Сумма</label>
        <input name="amount" type="number" step="0.01" value="{{ deal.amount or '' }}" class="w-full border border-slate-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm text-slate-600 mb-1">Валюта</label>
        <input name="currency" value="{{ deal.currency }}" class="w-full border border-slate-300 rounded px-3 py-2">
      </div>
      <div class="col-span-2 sm:col-span-1">
        <label class="block text-sm text-slate-600 mb-1">Вероятность %</label>
        <input name="probability" type="number" min="0" max="100" value="{{ deal.probability }}" class="w-full border border-slate-300 rounded px-3 py-2">
      </div>
    </div>
    <div>
      <label class="block text-sm text-slate-600 mb-1">Ожидаемое закрытие</label>
      <input name="expected_close" type="datetime-local" value="{{ deal.expected_close | dtinput }}" class="w-full border border-slate-300 rounded px-3 py-2">
    </div>
    <div class="flex flex-wrap gap-3 items-center">
      <button class="bg-slate-900 text-white rounded px-5 py-2 hover:bg-slate-700">Сохранить</button>
      <a href="/accounts/{{ deal.account_id }}#deals" class="px-5 py-2 text-slate-600 hover:underline">Отмена</a>
    </div>
  </form>
  <form method="post" action="/deals/{{ deal.id }}/delete" onsubmit="return confirm('Удалить сделку?')" class="mt-3">
    <button class="text-sm border border-red-200 text-red-600 rounded px-4 py-2 hover:bg-red-50">Удалить сделку</button>
  </form>
</div>
{% endblock %}
