{% extends "base.html" %}
{% block title %}Редактирование контакта — crmTool{% endblock %}
{% block content %}
<div class="max-w-xl">
  <div class="text-sm text-slate-500 mb-2">
    <a href="/accounts/{{ contact.account_id }}#contacts" class="hover:underline">← к клиенту</a>
  </div>
  <h1 class="text-2xl font-semibold mb-5">Редактирование контакта</h1>
  <form method="post" action="/contacts/{{ contact.id }}/edit" class="bg-white rounded-xl shadow-sm p-6 space-y-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-slate-600 mb-1">Имя *</label>
        <input name="name" required value="{{ contact.name }}" class="w-full border border-slate-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm text-slate-600 mb-1">Должность</label>
        <input name="position" value="{{ contact.position or '' }}" class="w-full border border-slate-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm text-slate-600 mb-1">Email</label>
        <input name="email" value="{{ contact.email or '' }}" class="w-full border border-slate-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm text-slate-600 mb-1">Телефон</label>
        <input name="phone" value="{{ contact.phone or '' }}" class="w-full border border-slate-300 rounded px-3 py-2">
      </div>
      <div class="sm:col-span-2">
        <label class="block text-sm text-slate-600 mb-1">Telegram</label>
        <input name="telegram" value="{{ contact.telegram or '' }}" class="w-full border border-slate-300 rounded px-3 py-2">
      </div>
    </div>
    <div class="flex flex-wrap gap-3">
      <button class="bg-slate-900 text-white rounded px-5 py-2 hover:bg-slate-700">Сохранить</button>
      <a href="/accounts/{{ contact.account_id }}#contacts" class="px-5 py-2 text-slate-600 hover:underline">Отмена</a>
    </div>
  </form>
  <form method="post" action="/contacts/{{ contact.id }}/delete" onsubmit="return confirm('Удалить контакт?')" class="mt-3">
    <button class="text-sm border border-red-200 text-red-600 rounded px-4 py-2 hover:bg-red-50">Удалить контакт</button>
  </form>
</div>
{% endblock %}
