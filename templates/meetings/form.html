{% extends "base.html" %}
{% block title %}Редактирование встречи — crmTool{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <div class="text-sm text-slate-500 mb-2">
    <a href="/accounts/{{ meeting.account_id }}#meetings" class="hover:underline">← {{ meeting.account.name }}</a>
  </div>
  <h1 class="text-2xl font-semibold mb-5">Редактирование встречи</h1>
  <form method="post" action="/meetings/{{ meeting.id }}/edit" class="bg-white rounded-xl shadow-sm p-6 space-y-4">
    <div>
      <label class="block text-sm text-slate-600 mb-1">Тема *</label>
      <input name="title" required value="{{ meeting.title }}" class="w-full border border-slate-300 rounded px-3 py-2">
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-slate-600 mb-1">Начало *</label>
        <input name="starts_at" type="datetime-local" required value="{{ meeting.starts_at | dtinput }}" class="w-full border border-slate-300 rounded px-3 py-2">
      </div>
      <div>
        <label class="block text-sm text-slate-600 mb-1">Конец</label>
        <input name="ends_at" type="datetime-local" value="{{ meeting.ends_at | dtinput }}" class="w-full border border-slate-300 rounded px-3 py-2">
      </div>
    </div>
    <div>
      <label class="block text-sm text-slate-600 mb-1">Ответственный</label>
      <select name="owner_id" class="w-full border border-slate-300 rounded px-3 py-2">
        <option value="">— не назначен —</option>
        {% for u in users %}<option value="{{ u.id }}" {{ 'selected' if meeting.owner_id==u.id }}>{{ u.name }}</option>{% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm text-slate-600 mb-1">Место / ссылка</label>
      <input name="location" value="{{ meeting.location or '' }}" class="w-full border border-slate-300 rounded px-3 py-2">
    </div>
    <div>
      <label class="block text-sm text-slate-600 mb-1">Участники</label>
      <input name="participants" value="{{ meeting.participants or '' }}" class="w-full border border-slate-300 rounded px-3 py-2">
    </div>
    <div class="flex flex-wrap gap-3">
      <button class="bg-slate-900 text-white rounded px-5 py-2 hover:bg-slate-700">Сохранить</button>
      <a href="/accounts/{{ meeting.account_id }}#meetings" class="px-5 py-2 text-slate-600 hover:underline">Отмена</a>
    </div>
  </form>
  <form method="post" action="/meetings/{{ meeting.id }}/delete" onsubmit="return confirm('Удалить встречу?')" class="mt-3">
    <button class="text-sm border border-red-200 text-red-600 rounded px-4 py-2 hover:bg-red-50">Удалить встречу</button>
  </form>
</div>
{% endblock %}
