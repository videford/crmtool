{% extends "base.html" %}
{% block title %}Вход — crmTool{% endblock %}
{% block guest %}
<div class="min-h-screen flex items-center justify-center bg-slate-100">
  <form method="post" action="/login" class="bg-white p-8 rounded-xl shadow-sm w-full max-w-sm space-y-4">
    <div class="text-2xl font-semibold text-center text-slate-800">crmTool</div>
    {% if error %}
      <div class="bg-red-50 text-red-700 text-sm rounded px-3 py-2">{{ error }}</div>
    {% endif %}
    <div>
      <label class="block text-sm text-slate-600 mb-1">Email</label>
      <input name="email" type="email" required autofocus
             class="w-full border border-slate-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-400">
    </div>
    <div>
      <label class="block text-sm text-slate-600 mb-1">Пароль</label>
      <input name="password" type="password" required
             class="w-full border border-slate-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-400">
    </div>
    <button class="w-full bg-slate-900 text-white rounded py-2 hover:bg-slate-700">Войти</button>
  </form>
</div>
{% endblock %}
