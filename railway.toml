# Railway build config, shared by BOTH services deployed from this repo.
#
# Deploy as TWO services in one Railway project (+ the PostgreSQL plugin):
#
#   1) web    — start command: (none; uses the Dockerfile CMD)
#               python -m app.init_db && uvicorn app.main:app --host 0.0.0.0 --port $PORT
#               Healthcheck path: /health   (set in the service dashboard)
#
#   2) worker — start command override (set in the service dashboard):
#               python -m worker.main
#               No domain, no healthcheck (it has no HTTP server).
#
# startCommand / healthcheck are intentionally NOT set here: config-as-code
# overrides the dashboard, so a shared value would force both services to run
# the same thing. Per-service start commands are set in the Railway dashboard.

[build]
builder = "dockerfile"
